<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netta's 59th Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background: linear-gradient(135deg, #1a0533 0%, #3d0066 35%, #6b0080 65%, #1a0533 100%);
  display:flex; align-items:center; justify-content:center;
  padding:20px; font-family:'Montserrat',sans-serif; overflow-x:hidden;
}
.invitation {
  max-width:600px; width:100%;
  background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, rgba(255,200,100,0.05) 100%);
  border:1px solid rgba(255,200,80,0.3); border-radius:24px;
  padding:50px 40px; text-align:center; position:relative;
  backdrop-filter:blur(10px);
  box-shadow: 0 0 80px rgba(180,0,255,0.3), 0 0 30px rgba(255,180,0,0.15), inset 0 0 60px rgba(255,255,255,0.02);
}
.sparkles { position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:24px; }
.sparkle {
  position:absolute; width:4px; height:4px; border-radius:50%;
  animation:twinkle 2s infinite;
}
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(0.5); }
  50% { opacity:1; transform:scale(1.8); }
}
.top-badge {
  display:inline-block;
  background: linear-gradient(90deg, #ff6bcb, #ffd700, #ff6bcb);
  background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;
  font-weight:600; letter-spacing:4px; font-size:0.72em;
  text-transform:uppercase; margin-bottom:28px; display:block;
}
@keyframes shimmer {
  0% { background-position:0% center; }
  100% { background-position:200% center; }
}
.photo-frame {
  width:220px; height:220px; border-radius:50%;
  margin:0 auto 32px; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.photo-frame::before {
  content:""; position:absolute; inset:-4px; border-radius:50%;
  background: conic-gradient(from 0deg, #ff6bcb, #ffd700, #ff00cc, #7b2fff, #ff6bcb);
  animation:spin 4s linear infinite; z-index:0;
}
.photo-frame::after {
  content:""; position:absolute; inset:2px; border-radius:50%;
  background:#2d0050; z-index:1;
}
.photo-frame img {
  width:210px; height:210px; border-radius:50%;
  object-fit:cover; object-position:center top;
  position:relative; z-index:2; display:block;
}
@keyframes spin { to { transform:rotate(360deg); } }
h1 {
  font-family:'Playfair Display',serif; font-size:3em; font-weight:700;
  color:#fff; text-shadow:0 0 30px rgba(255,180,0,0.6), 0 0 60px rgba(200,0,255,0.4);
  margin-bottom:6px; line-height:1.1;
}
.age {
  font-family:'Playfair Display',serif; font-style:italic; font-size:1.5em;
  background:linear-gradient(90deg,#ffd700,#ff9de2,#ffd700); background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite; margin-bottom:32px; display:block;
}
.divider {
  display:flex; align-items:center; gap:12px; margin:24px 0;
}
.divider::before,.divider::after {
  content:""; flex:1; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,200,80,0.5),transparent);
}
.divider span { color:#ffd700; font-size:1.2em; }
.details {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,200,80,0.2); border-radius:16px;
  padding:28px; margin:24px 0; text-align:left;
}
.detail-row {
  display:flex; align-items:flex-start; gap:14px;
  margin-bottom:18px; color:#fff;
}
.detail-row:last-child { margin-bottom:0; }
.detail-icon { font-size:1.4em; flex-shrink:0; width:28px; text-align:center; }
.detail-text { font-size:1em; line-height:1.5; }
.detail-label {
  font-weight:700; color:#ffd700; font-size:0.72em;
  letter-spacing:2px; text-transform:uppercase; display:block; margin-bottom:3px;
}
.message {
  font-family:'Playfair Display',serif; font-style:italic;
  color:rgba(255,255,255,0.85); font-size:1.05em; line-height:1.7; margin:24px 0;
}
.celebrate-btn {
  border:none; border-radius:50px; padding:16px 42px;
  background:linear-gradient(135deg,#ff6bcb,#7b2fff,#ffd700); background-size:200%;
  color:#fff; font-family:'Montserrat',sans-serif; font-size:1em; font-weight:700;
  letter-spacing:2px; cursor:pointer; animation:shimmer 3s linear infinite;
  box-shadow:0 0 30px rgba(255,100,200,0.5); transition:transform 0.2s,box-shadow 0.2s;
  margin-top:8px;
}
.celebrate-btn:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 0 50px rgba(255,100,200,0.8); }
.confetti-piece {
  position:fixed; pointer-events:none; border-radius:2px;
  animation:fall linear forwards; z-index:9999;
}
@keyframes fall {
  0% { transform:translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}
@media(max-width:480px) {
  .invitation { padding:36px 20px; }
  h1 { font-size:2.2em; }
  .photo-frame,.photo-frame img { width:170px; height:170px; }
}
@media print {
  body { background:white; }
  .invitation { border:2px solid #ccc; box-shadow:none; background:white; }
  h1,.age,.detail-text,.message { color:#333; -webkit-text-fill-color:#333; }
  .celebrate-btn { display:none; }
}
</style>
</head>

    `background:${colors[Math.floor(Math.random()*colors.length)]};` +

  sparklesEl.appendChild(s);
}

function celebrate() {
  const confettiColors = ['#ff6bcb','#ffd700','#7b2fff','#00e5ff','#ff4444','#00ff88','#ff8c00','#fff'];
  for (let i = 0; i < 150; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const size = 6 + Math.random() * 10;
      c.style.cssText = `left:${Math.random()*100}vw;top:-20px;` +
        `background:${confettiColors[Math.floor(Math.random()*confettiColors.length)]};` +
        `width:${size}px;height:${size}px;` +
        `animation-duration:${2+Math.random()*2.5}s;` +
        `border-radius:${Math.random()>0.5?'50%':'2px'}`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i * 20);
  }
}

window.addEventListener('load', () => setTimeout(celebrate, 500));
</script>
</body>
</html>
